<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Strength">
<meta name="theme-color" content="#0F6E56">
<title>Strength Log</title>
<style>
  :root {
    --accent: #0F6E56;
    --accent-light: #E1F5EE;
    --accent-dark: #085041;
    --bg: #FFFFFF;
    --surface: #F7F6F2;
    --surface-2: #EFEDE7;
    --text: #1A1A18;
    --text-2: #5F5E5A;
    --text-3: #888780;
    --border: rgba(0,0,0,0.10);
    --border-strong: rgba(0,0,0,0.18);
    --done-bg: #EAF3DE;
    --done-border: #97C459;
    --danger: #A32D2D;
    --pr-bg: #FAC775;
    --pr-text: #633806;
    --radius: 10px;
    --radius-sm: 6px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1A1A18;
      --surface: #2C2C2A;
      --surface-2: #3A3A37;
      --text: #F1EFE8;
      --text-2: #B4B2A9;
      --text-3: #888780;
      --border: rgba(255,255,255,0.12);
      --border-strong: rgba(255,255,255,0.22);
      --accent: #1D9E75;
      --accent-light: #04342C;
      --done-bg: #173404;
      --done-border: #3B6D11;
      --pr-bg: #633806;
      --pr-text: #FAC775;
    }
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    font-family: -apple-system, "SF Pro Text", BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    line-height: 1.4;
    -webkit-font-smoothing: antialiased;
  }
  body {
    max-width: 480px;
    margin: 0 auto;
    padding: 0 14px calc(16px + env(safe-area-inset-bottom)) 14px;
    padding-top: calc(10px + env(safe-area-inset-top));
  }
  h1 {
    font-size: 22px;
    font-weight: 600;
    margin: 6px 0 14px 0;
    letter-spacing: -0.3px;
  }
  button {
    font-family: inherit;
    font-size: inherit;
    color: inherit;
    cursor: pointer;
  }
  .tabs {
    display: flex;
    gap: 0;
    border-bottom: 0.5px solid var(--border);
    margin-bottom: 14px;
  }
  .tab {
    flex: 1;
    background: none;
    border: none;
    padding: 10px 4px;
    font-size: 14px;
    color: var(--text-2);
    border-bottom: 2px solid transparent;
    margin-bottom: -0.5px;
    font-weight: 500;
  }
  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  .header-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    gap: 10px;
  }
  .day-toggle {
    display: inline-flex;
    background: var(--surface);
    border-radius: var(--radius-sm);
    padding: 2px;
    font-size: 13px;
  }
  .day-toggle button {
    padding: 6px 14px;
    border: none;
    background: transparent;
    border-radius: 5px;
    color: var(--text-2);
    font-weight: 500;
  }
  .day-toggle button.active {
    background: var(--accent);
    color: white;
  }
  .date-picker {
    font-size: 13px;
    color: var(--text-2);
    background: transparent;
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius-sm);
    padding: 6px 8px;
    font-family: inherit;
    color-scheme: light dark;
  }
  .summary-bar {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
  }
  .summary-card {
    flex: 1;
    background: var(--surface);
    border-radius: var(--radius-sm);
    padding: 8px 10px;
    text-align: center;
  }
  .summary-label {
    font-size: 10px;
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-bottom: 2px;
  }
  .summary-value {
    font-size: 17px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .ex-card {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    margin-bottom: 8px;
    display: flex;
    gap: 10px;
    align-items: flex-start;
    transition: background 0.15s, border-color 0.15s;
  }
  .ex-card.done {
    background: var(--done-bg);
    border-color: var(--done-border);
  }
  .check {
    width: 24px;
    height: 24px;
    border-radius: 6px;
    border: 1.5px solid var(--border-strong);
    flex-shrink: 0;
    margin-top: 2px;
    background: var(--bg);
    position: relative;
    transition: background 0.12s, border-color 0.12s;
    padding: 0;
  }
  .check.filled {
    background: var(--accent);
    border-color: var(--accent);
  }
  .check.filled::after {
    content: "";
    position: absolute;
    left: 7px;
    top: 2px;
    width: 5px;
    height: 11px;
    border: solid white;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg);
  }
  .ex-body { flex: 1; min-width: 0; }
  .ex-name {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 1px;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .pr-badge {
    font-size: 9px;
    background: var(--pr-bg);
    color: var(--pr-text);
    padding: 2px 5px;
    border-radius: 3px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }
  .ex-prev {
    font-size: 11px;
    color: var(--text-3);
    margin-bottom: 7px;
    line-height: 1.3;
  }
  .field-row {
    display: flex;
    gap: 5px;
  }
  .stepper {
    display: flex;
    align-items: center;
    background: var(--surface);
    border-radius: 6px;
    padding: 2px;
    flex: 1;
    min-width: 0;
  }
  .stepper button {
    width: 22px;
    height: 26px;
    border: none;
    background: transparent;
    font-size: 16px;
    color: var(--text-2);
    border-radius: 4px;
    padding: 0;
    flex-shrink: 0;
    font-weight: 500;
  }
  .stepper button:active { background: var(--surface-2); }
  .stepper input {
    flex: 1;
    min-width: 0;
    text-align: center;
    font-size: 14px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    border: none;
    background: transparent;
    color: var(--text);
    padding: 0 2px;
    font-family: inherit;
    -moz-appearance: textfield;
  }
  .stepper input::-webkit-outer-spin-button,
  .stepper input::-webkit-inner-spin-button {
    -webkit-appearance: none; margin: 0;
  }
  .stepper input:focus { outline: none; color: var(--accent); }
  .stepper .unit {
    font-size: 9px;
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: 0.3px;
    padding: 0 3px 0 1px;
    pointer-events: none;
  }
  .band-select {
    flex: 0 0 auto;
    width: 92px;
    min-width: 0;
    background: var(--surface);
    border: none;
    border-radius: 6px;
    padding: 6px 6px;
    font-size: 13px;
    font-family: inherit;
    font-weight: 600;
    color: var(--text);
    -webkit-appearance: none;
    appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 12'><path fill='%23888780' d='M6 8L2 4h8z'/></svg>");
    background-repeat: no-repeat;
    background-position: right 6px center;
    background-size: 9px;
    padding-right: 18px;
    height: 30px;
    text-overflow: ellipsis;
  }
  .save-btn {
    width: 100%;
    padding: 13px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius);
    font-size: 15px;
    font-weight: 600;
    margin-top: 10px;
  }
  .save-btn:disabled {
    background: var(--surface-2);
    color: var(--text-3);
  }
  .save-btn:active:not(:disabled) { background: var(--accent-dark); }
  .saved-msg {
    text-align: center;
    font-size: 12px;
    color: var(--accent);
    margin-top: 6px;
    min-height: 14px;
  }
  .reset-btn {
    width: 100%;
    padding: 10px;
    background: transparent;
    color: var(--text-3);
    border: none;
    font-size: 12px;
    margin-top: 4px;
  }
  .history-selector { margin-bottom: 10px; }
  .history-selector label {
    display: block;
    font-size: 11px;
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-bottom: 4px;
  }
  .history-selector select,
  .metric-select {
    width: 100%;
    padding: 10px;
    font-size: 14px;
    font-family: inherit;
    background: var(--bg);
    color: var(--text);
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius-sm);
    -webkit-appearance: none;
    appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 12'><path fill='%23888780' d='M6 8L2 4h8z'/></svg>");
    background-repeat: no-repeat;
    background-position: right 10px center;
    background-size: 10px;
    padding-right: 28px;
  }
  .metric-select { margin-bottom: 12px; }
  .chart-wrap {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 14px 10px 10px 10px;
    margin-bottom: 12px;
    min-height: 180px;
  }
  .chart-empty {
    text-align: center;
    color: var(--text-3);
    font-size: 13px;
    padding: 40px 10px;
  }
  .stats-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px;
    margin-bottom: 12px;
  }
  .stat-card {
    background: var(--surface);
    padding: 10px 8px;
    border-radius: var(--radius-sm);
    text-align: center;
  }
  .stat-label {
    font-size: 10px;
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-bottom: 2px;
  }
  .stat-value {
    font-size: 16px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .session-list { margin-bottom: 12px; }
  .session-list-title {
    font-size: 11px;
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin: 14px 0 6px 0;
  }
  .session-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 10px;
    font-size: 13px;
    border-bottom: 0.5px solid var(--border);
    gap: 8px;
  }
  .session-row:last-child { border-bottom: none; }
  .session-date { color: var(--text-2); flex-shrink: 0; }
  .session-detail { font-weight: 500; font-variant-numeric: tabular-nums; text-align: right; }
  .action-row {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }
  .action-btn {
    flex: 1;
    padding: 11px;
    background: var(--bg);
    color: var(--text);
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 500;
  }
  .action-btn.danger { color: var(--danger); }
  .edit-day-toggle {
    display: flex;
    gap: 4px;
    margin-bottom: 12px;
  }
  .edit-day-toggle button {
    flex: 1;
    padding: 9px;
    background: var(--surface);
    border: none;
    border-radius: var(--radius-sm);
    font-size: 13px;
    color: var(--text-2);
    font-weight: 500;
  }
  .edit-day-toggle button.active {
    background: var(--accent);
    color: white;
  }
  .edit-ex-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 10px 12px;
    margin-bottom: 8px;
  }
  .edit-ex-head {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 6px;
  }
  .edit-ex-head input[type="text"] {
    flex: 1;
    min-width: 0;
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: 5px;
    padding: 7px 9px;
    font-size: 13px;
    font-weight: 600;
    font-family: inherit;
    color: var(--text);
  }
  .edit-ex-head input:focus { outline: none; border-color: var(--accent); }
  .edit-type-row {
    display: flex;
    gap: 6px;
    margin-bottom: 6px;
  }
  .edit-type-select {
    flex: 1;
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: 5px;
    padding: 7px 9px;
    font-size: 12px;
    font-family: inherit;
    color: var(--text);
    -webkit-appearance: none;
    appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 12'><path fill='%23888780' d='M6 8L2 4h8z'/></svg>");
    background-repeat: no-repeat;
    background-position: right 8px center;
    background-size: 9px;
    padding-right: 22px;
  }
  .icon-btn {
    width: 28px;
    height: 28px;
    border: none;
    background: transparent;
    border-radius: 5px;
    color: var(--text-3);
    font-size: 16px;
    padding: 0;
    flex-shrink: 0;
  }
  .icon-btn.danger { color: var(--danger); }
  .icon-btn:active { background: var(--surface-2); }
  .edit-note-input {
    width: 100%;
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: 5px;
    padding: 6px 9px;
    font-size: 12px;
    font-family: inherit;
    color: var(--text-2);
  }
  .edit-note-input:focus { outline: none; border-color: var(--accent); }
  .edit-note-input::placeholder { color: var(--text-3); }
  .add-ex-btn {
    width: 100%;
    padding: 11px;
    background: transparent;
    color: var(--accent);
    border: 0.5px dashed var(--accent);
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 500;
    margin-top: 4px;
  }
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 100;
  }
  .modal-backdrop.show { display: flex; }
  .modal {
    background: var(--bg);
    border-radius: var(--radius);
    padding: 18px;
    max-width: 320px;
    width: 100%;
  }
  .modal-title {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .modal-body {
    font-size: 13px;
    color: var(--text-2);
    margin-bottom: 16px;
    line-height: 1.5;
  }
  .modal-actions {
    display: flex;
    gap: 8px;
  }
  .modal-actions button {
    flex: 1;
    padding: 10px;
    border-radius: var(--radius-sm);
    border: none;
    font-size: 14px;
    font-weight: 500;
  }
  .modal-cancel {
    background: var(--surface);
    color: var(--text);
  }
  .modal-confirm {
    background: var(--danger);
    color: white;
  }
  .hidden { display: none !important; }
</style>
</head>
<body>

<h1>Strength Log</h1>

<div class="tabs">
  <button class="tab active" data-tab="today">Today</button>
  <button class="tab" data-tab="history">History</button>
  <button class="tab" data-tab="edit">Edit</button>
</div>

<div id="tab-today">
  <div class="header-row">
    <div class="day-toggle">
      <button data-day="mon" class="active">Monday</button>
      <button data-day="fri">Friday</button>
    </div>
    <input type="date" class="date-picker" id="session-date">
  </div>

  <div class="summary-bar">
    <div class="summary-card">
      <div class="summary-label">Completed</div>
      <div class="summary-value" id="summary-completed">0 / 0</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">Volume</div>
      <div class="summary-value" id="summary-volume">0</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">PRs</div>
      <div class="summary-value" id="summary-prs">0</div>
    </div>
  </div>

  <div id="exercise-list"></div>

  <button class="save-btn" id="save-btn">Save session</button>
  <div class="saved-msg" id="saved-msg"></div>
  <button class="reset-btn" id="reset-today-btn">Clear today's entries</button>
</div>

<div id="tab-history" class="hidden">
  <div class="history-selector">
    <label>Exercise</label>
    <select id="history-select"></select>
  </div>

  <select class="metric-select" id="metric-select"></select>

  <div class="chart-wrap" id="chart-wrap">
    <div class="chart-empty">Save a session to see progress.</div>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Sessions</div>
      <div class="stat-value" id="stat-sessions">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Best</div>
      <div class="stat-value" id="stat-best">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Last</div>
      <div class="stat-value" id="stat-last">—</div>
    </div>
  </div>

  <div class="session-list-title">Recent sessions</div>
  <div class="session-list" id="session-list"></div>

  <div class="action-row">
    <button class="action-btn" id="export-csv">Export CSV</button>
    <button class="action-btn danger" id="reset-all-btn">Reset all data</button>
  </div>
</div>

<div id="tab-edit" class="hidden">
  <div class="edit-day-toggle">
    <button data-edit-day="mon" class="active">Monday exercises</button>
    <button data-edit-day="fri">Friday exercises</button>
  </div>
  <div id="edit-list"></div>
  <button class="add-ex-btn" id="add-ex-btn">+ Add exercise</button>
</div>

<div class="modal-backdrop" id="modal">
  <div class="modal">
    <div class="modal-title" id="modal-title">Confirm</div>
    <div class="modal-body" id="modal-body">Are you sure?</div>
    <div class="modal-actions">
      <button class="modal-cancel" id="modal-cancel">Cancel</button>
      <button class="modal-confirm" id="modal-confirm">Confirm</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// EXERCISE TYPES
// ============================================================
const TYPES = {
  weighted: {
    label: 'Weighted',
    fields: ['weight', 'reps', 'sets'],
    metrics: [
      { key: 'topWeight', label: 'Top weight' },
      { key: 'volume', label: 'Volume (w x r x s)' },
      { key: 'repsAtWeight', label: 'Reps at most common weight' }
    ],
    defaultMetric: 'topWeight'
  },
  bodyweight: {
    label: 'Bodyweight',
    fields: ['reps', 'sets'],
    metrics: [
      { key: 'totalReps', label: 'Total reps (r x s)' },
      { key: 'topReps', label: 'Top-set reps' }
    ],
    defaultMetric: 'totalReps'
  },
  hang: {
    label: 'Hang',
    fields: ['seconds', 'reps'],
    metrics: [
      { key: 'seconds', label: 'Seconds held' },
      { key: 'totalSeconds', label: 'Total time (s x reps)' }
    ],
    defaultMetric: 'seconds'
  },
  band_lateral: {
    label: 'Band lateral',
    fields: ['band', 'laps'],
    metrics: [
      { key: 'laps', label: 'Laps' }
    ],
    defaultMetric: 'laps'
  },
  band_reps: {
    label: 'Band reps',
    fields: ['band', 'reps', 'sets'],
    metrics: [
      { key: 'totalReps', label: 'Total reps (r x s)' },
      { key: 'topReps', label: 'Top-set reps' }
    ],
    defaultMetric: 'totalReps'
  }
};

const BAND_COLORS = [
  { value: 'none',   label: 'No band' },
  { value: 'yellow', label: 'Yellow' },
  { value: 'red',    label: 'Red' },
  { value: 'green',  label: 'Green' },
  { value: 'orange', label: 'Orange' },
  { value: 'blue',   label: 'Blue' },
  { value: 'purple', label: 'Purple' },
  { value: 'black',  label: 'Black' }
];

const FIELD_CONFIG = {
  weight:  { unit: 'lb',  step: 5, min: 0, kind: 'number' },
  reps:    { unit: 'rep', step: 1, min: 0, kind: 'number' },
  sets:    { unit: 'set', step: 1, min: 0, kind: 'number' },
  seconds: { unit: 'sec', step: 5, min: 0, kind: 'number' },
  laps:    { unit: 'lap', step: 1, min: 0, kind: 'number' },
  band:    { kind: 'band' }
};

// ============================================================
// DEFAULTS
// ============================================================
const STORAGE_KEY = 'strength_log_v2';

const DEFAULT_EXERCISES = {
  mon: [
    { id: 'm1', name: 'Lateral step w/ mini-band', type: 'band_lateral', note: 'driveway & back, each side', band: 'red', laps: 1 },
    { id: 'm2', name: 'Lateral jumps w/ mini-band', type: 'band_lateral', note: 'driveway & back, each side', band: 'red', laps: 1 },
    { id: 'm3', name: 'Kickbacks with mini-band', type: 'band_reps', note: 'each leg, band at ankle', band: 'orange', reps: 30, sets: 1 },
    { id: 'm4', name: 'Heavy barbell back squats', type: 'weighted', note: 'ascending sets of 6 - top set', weight: 205, reps: 6, sets: 1 },
    { id: 'm5', name: 'Overhead dumbbell press', type: 'weighted', note: 'to near failure', weight: 30, reps: 12, sets: 2 },

let state = loadState();

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (!parsed.exercises) parsed.exercises = structuredClone(DEFAULT_EXERCISES);
      if (!parsed.sessions) parsed.sessions = [];
      if (!parsed.draft) parsed.draft = {};
      for (const day of ['mon','fri']) {
        if (parsed.exercises[day]) {
          for (const ex of parsed.exercises[day]) {
            if (!ex.type) ex.type = 'weighted';
          }
        }
      }
      return parsed;
    }
  } catch (e) { console.error('loadState', e); }
  return {
    exercises: structuredClone(DEFAULT_EXERCISES),
    sessions: [],
    draft: {}
  };
}

function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

// UTILITIES
// ============================================================
function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function fmtDate(str) {
  const [y,m,d] = str.split('-').map(Number);
  return new Date(y, m-1, d).toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
}
function fmtDateLong(str) {
  const [y,m,d] = str.split('-').map(Number);
  return new Date(y, m-1, d).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
}
function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}
function bandLabel(v) {
  const b = BAND_COLORS.find(c => c.value === v);
  return b ? b.label : 'No band';
}
function defaultDayForDate(dateStr) {
  const [y,m,d] = dateStr.split('-').map(Number);
  const dow = new Date(y, m-1, d).getDay();
  if (dow === 1) return 'mon';
  if (dow === 5) return 'fri';
  const recent = [...state.sessions].sort((a,b) => b.date.localeCompare(a.date))[0];
  return recent ? recent.day : 'mon';
}

function getPreviousSession(day, exerciseId, beforeDate) {
  const candidates = state.sessions
    .filter(s => s.day === day)
    .filter(s => !beforeDate || s.date < beforeDate)
    .sort((a,b) => b.date.localeCompare(a.date));
  for (const s of candidates) {
    const entry = s.entries.find(e => e.id === exerciseId && e.completed);
    if (entry) return { session: s, entry };
  }
  return null;
}

function computeMetric(entry, metric) {
  switch (metric) {
    case 'topWeight': return entry.weight != null ? entry.weight : null;
    case 'volume':
      if (entry.weight && entry.reps && entry.sets) return entry.weight * entry.reps * entry.sets;
      return null;
    case 'repsAtWeight': return entry.reps != null ? entry.reps : null;
    case 'totalReps':
      if (entry.reps && entry.sets) return entry.reps * entry.sets;
      return null;
    case 'topReps': return entry.reps != null ? entry.reps : null;
    case 'seconds': return entry.seconds != null ? entry.seconds : null;
    case 'totalSeconds':
      if (entry.seconds && entry.reps) return entry.seconds * entry.reps;
      return entry.seconds != null ? entry.seconds : null;
    case 'laps': return entry.laps != null ? entry.laps : null;
    default: return null;
  }
}

function getPersonalBestMetric(exercise) {
  const metric = TYPES[exercise.type].defaultMetric;
  let best = null;
  for (const s of state.sessions) {
    for (const e of s.entries) {
      if (e.id === exercise.id && e.completed) {
        const v = computeMetric(e, metric);
        if (v != null && v > 0 && (best == null || v > best)) best = v;
      }
    }
  }
  return best;
}

function metricUnit(metric) {
  switch (metric) {
    case 'topWeight': return 'lb';
    case 'volume': return 'lb\u00b7r';
    case 'repsAtWeight': return 'reps';
    case 'totalReps': case 'topReps': return 'reps';
    case 'seconds': case 'totalSeconds': return 'sec';
    case 'laps': return 'laps';
    default: return '';
  }
}

const dateInput = document.getElementById('session-date');
const exerciseList = document.getElementById('exercise-list');
const savedMsg = document.getElementById('saved-msg');

function draftKey(day, date) { return day + '_' + date; }

function getDraft() {
  const k = draftKey(currentDay, currentDate);
  if (!state.draft[k]) state.draft[k] = {};
  return state.draft[k];
}

function initTodayDefaults() {
  const draft = getDraft();
  const exercises = state.exercises[currentDay];
  for (const ex of exercises) {
    if (!draft[ex.id]) {
      const prev = getPreviousSession(currentDay, ex.id, currentDate);
      const d = { completed: false };
      const fields = TYPES[ex.type].fields;
      for (const f of fields) {
        if (prev && prev.entry[f] !== undefined && prev.entry[f] !== null) {
          d[f] = prev.entry[f];
        } else if (ex[f] !== undefined && ex[f] !== null) {
          d[f] = ex[f];
        } else {
          d[f] = (f === 'band') ? 'none' : null;
        }
      }
      draft[ex.id] = d;
    }
  }
}

function formatEntrySummary(entry, type) {
  const parts = [];
  if (type === 'weighted') {
    if (entry.weight != null) parts.push(entry.weight + ' lb');
    if (entry.reps != null) parts.push(entry.reps + ' rep' + (entry.reps === 1 ? '' : 's'));
    if (entry.sets != null && entry.sets > 1) parts.push(entry.sets + ' sets');
    return parts.join(' \u00d7 ') || 'done';
  }
  if (type === 'bodyweight') {
    if (entry.reps != null) parts.push(entry.reps + ' rep' + (entry.reps === 1 ? '' : 's'));
    if (entry.sets != null && entry.sets > 1) parts.push(entry.sets + ' sets');
    return parts.join(' \u00d7 ') || 'done';
  }
  if (type === 'band_reps') {
    if (entry.band && entry.band !== 'none') parts.push(bandLabel(entry.band).toLowerCase() + ' band');
    if (entry.reps != null) parts.push(entry.reps + ' rep' + (entry.reps === 1 ? '' : 's'));
    if (entry.sets != null && entry.sets > 1) parts.push(entry.sets + ' sets');
    return parts.join(' \u00b7 ') || 'done';
  }
  if (type === 'hang') {
    if (entry.seconds != null) parts.push(entry.seconds + ' sec');
    if (entry.reps != null && entry.reps > 1) parts.push(entry.reps + ' reps');
    return parts.join(' \u00d7 ') || 'done';
  }
  if (type === 'band_lateral') {
    if (entry.band && entry.band !== 'none') parts.push(bandLabel(entry.band).toLowerCase() + ' band');
    if (entry.laps != null) parts.push(entry.laps + ' lap' + (entry.laps === 1 ? '' : 's'));
    return parts.join(' \u00b7 ') || 'done';
  }
  return 'done';
}

function fieldHtml(exId, field, val) {
  const conf = FIELD_CONFIG[field];
  if (conf.kind === 'band') {
    const options = BAND_COLORS.map(b =>
      '<option value="' + b.value + '"' + (val === b.value ? ' selected' : '') + '>' + b.label + '</option>'
    ).join('');
    return '<select class="band-select" data-bandselect data-id="' + exId + '" data-field="' + field + '">' + options + '</select>';
  }
  const display = val == null ? '' : val;
  return '' +
    '<div class="stepper">' +
      '<button data-step data-id="' + exId + '" data-field="' + field + '" data-delta="-' + conf.step + '">\u2212</button>' +
      '<input type="number" inputmode="decimal" data-numinput data-id="' + exId + '" data-field="' + field + '" value="' + display + '" placeholder="\u2014">' +
      '<span class="unit">' + conf.unit + '</span>' +
      '<button data-step data-id="' + exId + '" data-field="' + field + '" data-delta="' + conf.step + '">+</button>' +
    '</div>';
}

function renderToday() {
  dateInput.value = currentDate;
  document.querySelectorAll('.day-toggle button').forEach(b => {
    b.classList.toggle('active', b.dataset.day === currentDay);
  });

  initTodayDefaults();
  const draft = getDraft();
  const exercises = state.exercises[currentDay];

  exerciseList.innerHTML = '';
  let completed = 0;
  let volume = 0;
  let prs = 0;

  for (const ex of exercises) {
    const d = draft[ex.id];
    const type = TYPES[ex.type];
    const prev = getPreviousSession(currentDay, ex.id, currentDate);
    const pb = getPersonalBestMetric(ex);
    const currentValue = d.completed ? computeMetric(d, type.defaultMetric) : null;
    const isPR = d.completed && currentValue != null && pb != null && currentValue >= pb && currentValue > 0;
    if (d.completed) {
      completed++;
      if (d.weight && d.reps && d.sets) volume += d.weight * d.reps * d.sets;
      if (isPR) prs++;
    }

    const card = document.createElement('div');
    card.className = 'ex-card' + (d.completed ? ' done' : '');

    let prevText = '';
    if (prev) {
      prevText = 'last ' + fmtDate(prev.session.date) + ': ' + formatEntrySummary(prev.entry, ex.type);
      if (ex.note) prevText += ' \u00b7 ' + ex.note;
    } else if (ex.note) {
      prevText = ex.note;
    }

    let fieldsHtml = '<div class="field-row">';
    for (const f of type.fields) {
      fieldsHtml += fieldHtml(ex.id, f, d[f]);
    }
    fieldsHtml += '</div>';

    card.innerHTML =
      '<button class="check ' + (d.completed ? 'filled' : '') + '" data-check="' + ex.id + '" aria-label="Toggle complete"></button>' +
      '<div class="ex-body">' +
        '<div class="ex-name">' + escapeHtml(ex.name) + (isPR ? '<span class="pr-badge">PR</span>' : '') + '</div>' +
        (prevText ? '<div class="ex-prev">' + escapeHtml(prevText) + '</div>' : '') +
        fieldsHtml +
      '</div>';
    exerciseList.appendChild(card);
  }

  document.getElementById('summary-completed').textContent = completed + ' / ' + exercises.length;
  document.getElementById('summary-volume').textContent = volume.toLocaleString();
  document.getElementById('summary-prs').textContent = prs;

  exerciseList.querySelectorAll('[data-check]').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.check;
      draft[id].completed = !draft[id].completed;
      saveState();
      renderToday();
    });
  });
  exerciseList.querySelectorAll('[data-step]').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.id;
      const field = btn.dataset.field;
      const step = parseInt(btn.dataset.delta, 10);
      const d = draft[id];
      const conf = FIELD_CONFIG[field];
      const current = d[field];
      let next;
      if (current == null) {
        next = step > 0 ? conf.step : null;
      } else {
        next = current + step;
        if (next < conf.min) next = conf.min;
      }
      d[field] = next;
      saveState();
      renderToday();
    });
  });
  exerciseList.querySelectorAll('[data-numinput]').forEach(inp => {
    inp.addEventListener('change', () => {
      const id = inp.dataset.id;
      const field = inp.dataset.field;
      const v = inp.value.trim();
      draft[id][field] = v === '' ? null : Math.max(0, parseFloat(v) || 0);
      saveState();
      renderToday();
    });
    inp.addEventListener('focus', () => inp.select());
  });
  exerciseList.querySelectorAll('[data-bandselect]').forEach(sel => {
    sel.addEventListener('change', () => {
      const id = sel.dataset.id;
      const field = sel.dataset.field;
      draft[id][field] = sel.value;
      saveState();
      renderToday();
    });
  });
}

document.querySelectorAll('.day-toggle button').forEach(b => {
  b.addEventListener('click', () => { currentDay = b.dataset.day; renderToday(); });
});
dateInput.addEventListener('change', () => {
  currentDate = dateInput.value || todayStr();
  renderToday();
});

document.getElementById('save-btn').addEventListener('click', () => {
  const draft = getDraft();
  const exercises = state.exercises[currentDay];
  const entries = exercises.map(ex => {
    const d = draft[ex.id] || {};
    const entry = {
      id: ex.id,
      name: ex.name,
      type: ex.type,
      completed: !!d.completed
    };
    for (const f of TYPES[ex.type].fields) {
      entry[f] = (d[f] == null) ? null : d[f];
    }
    return entry;
  });
  if (!entries.some(e => e.completed)) {
    showModal('Nothing to save', 'No exercises are checked off yet. Check at least one before saving.', null, true);
    return;
  }
  state.sessions = state.sessions.filter(s => !(s.date === currentDate && s.day === currentDay));
  state.sessions.push({ date: currentDate, day: currentDay, entries });
  saveState();
  savedMsg.textContent = '\u2713 Saved ' + fmtDateLong(currentDate);
  setTimeout(() => { savedMsg.textContent = ''; }, 2500);
  renderToday();
  renderHistory();
});

document.getElementById('reset-today-btn').addEventListener('click', () => {
  showModal("Clear entries?", "This clears the current check marks and values you have on screen. Saved sessions are not affected.", () => {
    delete state.draft[draftKey(currentDay, currentDate)];
    saveState();
    renderToday();
  });
});

const historySelect = document.getElementById('history-select');
const metricSelect = document.getElementById('metric-select');
const chartWrap = document.getElementById('chart-wrap');
const sessionListEl = document.getElementById('session-list');

function allExercises() {
  const map = new Map();
  for (const day of ['mon','fri']) {
    for (const ex of state.exercises[day]) {
      if (!map.has(ex.id)) map.set(ex.id, { id: ex.id, name: ex.name, type: ex.type });
    }
  }
  for (const s of state.sessions) {
    for (const e of s.entries) {
      if (!map.has(e.id)) map.set(e.id, { id: e.id, name: e.name, type: e.type || 'weighted' });
    }
  }
  return [...map.values()];
}

function getExForHistory(id) {
  return allExercises().find(e => e.id === id) || null;
}

function renderHistory() {
  const exList = allExercises();
  if (!currentHistoryEx || !exList.find(e => e.id === currentHistoryEx)) {
    currentHistoryEx = exList.length ? exList[0].id : null;
  }
  historySelect.innerHTML = exList.map(e =>
    '<option value="' + e.id + '"' + (e.id === currentHistoryEx ? ' selected' : '') + '>' + escapeHtml(e.name) + '</option>'
  ).join('');

  const ex = getExForHistory(currentHistoryEx);
  if (!ex) {
    metricSelect.innerHTML = '';
    chartWrap.innerHTML = '<div class="chart-empty">No exercises yet.</div>';
    document.getElementById('stat-sessions').textContent = '0';
    document.getElementById('stat-best').textContent = '\u2014';
    document.getElementById('stat-last').textContent = '\u2014';
    renderSessionList();
    return;
  }
  const type = TYPES[ex.type];
  const metrics = type.metrics.concat([{ key: 'frequency', label: 'Session frequency' }]);
  if (!currentMetric || !metrics.find(m => m.key === currentMetric)) {
    currentMetric = type.defaultMetric;
  }
  metricSelect.innerHTML = metrics.map(m =>
    '<option value="' + m.key + '"' + (m.key === currentMetric ? ' selected' : '') + '>' + escapeHtml(m.label) + '</option>'
  ).join('');

  drawChart();
  renderSessionList();
}

function getExerciseHistory(exId) {
  const rows = [];
  for (const s of state.sessions) {
    const e = s.entries.find(x => x.id === exId && x.completed);
    if (e) rows.push({ date: s.date, day: s.day, entry: e });
  }
  rows.sort((a,b) => a.date.localeCompare(b.date));
  return rows;
}

function getFrequencyData() {
  const weekCounts = new Map();
  for (const s of state.sessions) {
    const [y,m,d] = s.date.split('-').map(Number);
    const dt = new Date(y, m-1, d);
    const dow = (dt.getDay() + 6) % 7;
    const weekStart = new Date(dt);
    weekStart.setDate(dt.getDate() - dow);
    const key = weekStart.getFullYear() + '-' + String(weekStart.getMonth()+1).padStart(2,'0') + '-' + String(weekStart.getDate()).padStart(2,'0');
    weekCounts.set(key, (weekCounts.get(key) || 0) + 1);
  }
  return [...weekCounts.entries()]
    .sort((a,b) => a[0].localeCompare(b[0]))
    .map(([date, count]) => ({ date, value: count }));
}

function drawChart() {
  const ex = getExForHistory(currentHistoryEx);
  if (!ex) return;
  let points = [];
  let yLabel = '';

  if (currentMetric === 'frequency') {
    points = getFrequencyData().map(f => ({ date: f.date, value: f.value, label: f.value + '' }));
    yLabel = 'sessions/wk';
  } else {
    const hist = getExerciseHistory(currentHistoryEx);
    if (currentMetric === 'repsAtWeight') {
      const wCount = new Map();
      for (const r of hist) if (r.entry.weight != null) wCount.set(r.entry.weight, (wCount.get(r.entry.weight) || 0) + 1);
      if (wCount.size > 0) {
        let bestW = null, bestC = 0;
        for (const [w,c] of wCount) if (c > bestC) { bestC = c; bestW = w; }
        points = hist.filter(r => r.entry.weight === bestW && r.entry.reps != null)
          .map(r => ({ date: r.date, value: r.entry.reps, label: r.entry.reps + ' reps' }));
        yLabel = 'reps @ ' + bestW + ' lb';
      }
    } else {
      for (const r of hist) {
        const v = computeMetric(r.entry, currentMetric);
        if (v != null) {
          points.push({ date: r.date, value: v, label: v + ' ' + metricUnit(currentMetric) });
        }
      }
      yLabel = metricUnit(currentMetric);
    }
  }

  if (points.length === 0) {
    chartWrap.innerHTML = '<div class="chart-empty">No data yet for this view.<br>Save a session to see progress.</div>';
    document.getElementById('stat-sessions').textContent = '0';
    document.getElementById('stat-best').textContent = '\u2014';
    document.getElementById('stat-last').textContent = '\u2014';
    return;
  }

  chartWrap.innerHTML = '';
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('viewBox', '0 0 320 180');
  svg.style.width = '100%';
  svg.style.height = '160px';
  svg.style.overflow = 'visible';

  const padding = { l: 36, r: 10, t: 10, b: 28 };
  const W = 320, H = 180;
  const innerW = W - padding.l - padding.r;
  const innerH = H - padding.t - padding.b;

  const values = points.map(p => p.value);
  let minV = Math.min(...values);
  let maxV = Math.max(...values);
  if (minV === maxV) { minV = Math.max(0, minV - 1); maxV = maxV + 1; }
  const range = maxV - minV;

  for (let i = 0; i <= 2; i++) {
    const v = minV + (range * i / 2);
    const y = padding.t + innerH - (innerH * i / 2);
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', padding.l);
    line.setAttribute('x2', W - padding.r);
    line.setAttribute('y1', y);
    line.setAttribute('y2', y);
    line.setAttribute('stroke', 'currentColor');
    line.setAttribute('stroke-width', '0.5');
    line.setAttribute('opacity', '0.15');
    svg.appendChild(line);

    const lbl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    lbl.setAttribute('x', padding.l - 4);
    lbl.setAttribute('y', y + 3);
    lbl.setAttribute('text-anchor', 'end');
    lbl.setAttribute('font-size', '9');
    lbl.setAttribute('fill', 'currentColor');
    lbl.setAttribute('opacity', '0.6');
    lbl.textContent = Math.round(v);
    svg.appendChild(lbl);
  }

  const coords = points.map((p, i) => {
    const x = padding.l + (points.length === 1 ? innerW/2 : (innerW * i / (points.length - 1)));
    const y = padding.t + innerH - (innerH * (p.value - minV) / range);
    return { x, y, p };
  });

  if (coords.length > 1) {
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
    path.setAttribute('points', coords.map(c => c.x + ',' + c.y).join(' '));
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke', '#0F6E56');
    path.setAttribute('stroke-width', '2');
    path.setAttribute('stroke-linejoin', 'round');
    svg.appendChild(path);
  }
  coords.forEach(c => {
    const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    dot.setAttribute('cx', c.x);
    dot.setAttribute('cy', c.y);
    dot.setAttribute('r', '3');
    dot.setAttribute('fill', '#0F6E56');
    svg.appendChild(dot);
  });

  if (coords.length >= 1) {
    const first = coords[0], last = coords[coords.length - 1];
    const makeLabel = (c, txt, anchor) => {
      const lbl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      lbl.setAttribute('x', c.x);
      lbl.setAttribute('y', H - padding.b + 14);
      lbl.setAttribute('text-anchor', anchor);
      lbl.setAttribute('font-size', '9');
      lbl.setAttribute('fill', 'currentColor');
      lbl.setAttribute('opacity', '0.6');
      lbl.textContent = txt;
      svg.appendChild(lbl);
    };
    makeLabel(first, fmtDate(first.p.date), coords.length > 1 ? 'start' : 'middle');
    if (coords.length > 1) makeLabel(last, fmtDate(last.p.date), 'end');
  }

  const yl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  yl.setAttribute('x', W - padding.r);
  yl.setAttribute('y', padding.t - 2);
  yl.setAttribute('text-anchor', 'end');
  yl.setAttribute('font-size', '9');
  yl.setAttribute('fill', 'currentColor');
  yl.setAttribute('opacity', '0.6');
  yl.textContent = yLabel;
  svg.appendChild(yl);

  chartWrap.appendChild(svg);

  const unit = metricUnit(currentMetric);
  document.getElementById('stat-sessions').textContent = points.length;
  const bestVal = Math.max(...values);
  document.getElementById('stat-best').textContent = bestVal + (unit ? ' ' + unit : '');
  document.getElementById('stat-last').textContent = points[points.length-1].label;
}

function renderSessionList() {
  const ex = getExForHistory(currentHistoryEx);
  if (!ex || currentMetric === 'frequency') {
    const recent = [...state.sessions].sort((a,b) => b.date.localeCompare(a.date)).slice(0, 8);
    if (recent.length === 0) {
      sessionListEl.innerHTML = '<div style="color: var(--text-3); font-size: 13px; padding: 12px 4px;">No sessions yet.</div>';
      return;
    }
    sessionListEl.innerHTML = recent.map(s => {
      const done = s.entries.filter(e => e.completed).length;
      return '<div class="session-row">' +
        '<span class="session-date">' + fmtDateLong(s.date) + ' \u00b7 ' + (s.day === 'mon' ? 'Monday' : 'Friday') + '</span>' +
        '<span class="session-detail">' + done + ' / ' + s.entries.length + '</span>' +
      '</div>';
    }).join('');
    return;
  }
  const hist = getExerciseHistory(currentHistoryEx).reverse().slice(0, 8);
  if (hist.length === 0) {
    sessionListEl.innerHTML = '<div style="color: var(--text-3); font-size: 13px; padding: 12px 4px;">No completed sessions for this exercise yet.</div>';
    return;
  }
  sessionListEl.innerHTML = hist.map(r =>
    '<div class="session-row">' +
      '<span class="session-date">' + fmtDateLong(r.date) + '</span>' +
      '<span class="session-detail">' + escapeHtml(formatEntrySummary(r.entry, ex.type)) + '</span>' +
    '</div>'
  ).join('');
}

historySelect.addEventListener('change', () => {
  currentHistoryEx = historySelect.value;
  const ex = getExForHistory(currentHistoryEx);
  if (ex) currentMetric = TYPES[ex.type].defaultMetric;
  renderHistory();
});
metricSelect.addEventListener('change', () => {
  currentMetric = metricSelect.value;
  drawChart();
  renderSessionList();
});

document.getElementById('export-csv').addEventListener('click', () => {
  const rows = [['date','day','exercise_id','exercise_name','type','completed','weight_lb','reps','sets','seconds','band','laps','volume']];
  for (const s of state.sessions) {
    for (const e of s.entries) {
      const vol = (e.completed && e.weight && e.reps && e.sets) ? e.weight * e.reps * e.sets : '';
      rows.push([
        s.date, s.day, e.id,
        '"' + (e.name || '').replace(/"/g,'""') + '"',
        e.type || '',
        e.completed ? 'true' : 'false',
        e.weight == null ? '' : e.weight,
        e.reps == null ? '' : e.reps,
        e.sets == null ? '' : e.sets,
        e.seconds == null ? '' : e.seconds,
        e.band == null ? '' : e.band,
        e.laps == null ? '' : e.laps,
        vol
      ]);
    }
  }
  const csv = rows.map(r => r.join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'strength-log-' + todayStr() + '.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
});

document.getElementById('reset-all-btn').addEventListener('click', () => {
  showModal('Reset all data?', 'This deletes all saved sessions and resets the exercise lists to defaults. Cannot be undone.', () => {
    state = {
      exercises: structuredClone(DEFAULT_EXERCISES),
      sessions: [],
      draft: {}
    };
    saveState();
    renderAll();
  });
});

// ============================================================
// EDIT VIEW
// ============================================================
const editList = document.getElementById('edit-list');

function renderEdit() {
  document.querySelectorAll('.edit-day-toggle button').forEach(b => {
    b.classList.toggle('active', b.dataset.editDay === currentEditDay);
  });
  const exercises = state.exercises[currentEditDay];
  editList.innerHTML = '';
  exercises.forEach((ex, idx) => {
    const card = document.createElement('div');
    card.className = 'edit-ex-card';
    const typeOptions = Object.entries(TYPES).map(([k,t]) =>
      '<option value="' + k + '"' + (ex.type === k ? ' selected' : '') + '>' + t.label + '</option>'
    ).join('');
    card.innerHTML =
      '<div class="edit-ex-head">' +
        '<button class="icon-btn" data-move-up="' + ex.id + '"' + (idx === 0 ? ' disabled style="opacity:0.3"' : '') + '>\u2191</button>' +
        '<button class="icon-btn" data-move-down="' + ex.id + '"' + (idx === exercises.length - 1 ? ' disabled style="opacity:0.3"' : '') + '>\u2193</button>' +
        '<input type="text" data-edit-name="' + ex.id + '" value="' + escapeHtml(ex.name) + '" placeholder="Exercise name">' +
        '<button class="icon-btn danger" data-delete="' + ex.id + '">\u00d7</button>' +
      '</div>' +
      '<div class="edit-type-row">' +
        '<select class="edit-type-select" data-edit-type="' + ex.id + '">' + typeOptions + '</select>' +
      '</div>' +
      '<input type="text" class="edit-note-input" data-edit-note="' + ex.id + '" value="' + escapeHtml(ex.note || '') + '" placeholder="Notes (bands, form cues, etc.)">';
    editList.appendChild(card);
  });

  editList.querySelectorAll('[data-edit-name]').forEach(inp => {
    inp.addEventListener('change', () => {
      const ex = state.exercises[currentEditDay].find(x => x.id === inp.dataset.editName);
      if (ex) { ex.name = inp.value.trim() || ex.name; saveState(); }
    });
  });
  editList.querySelectorAll('[data-edit-type]').forEach(sel => {
    sel.addEventListener('change', () => {
      const ex = state.exercises[currentEditDay].find(x => x.id === sel.dataset.editType);
      if (ex) {
        ex.type = sel.value;
        for (const k of Object.keys(state.draft)) {
          if (state.draft[k][ex.id]) delete state.draft[k][ex.id];
        }
        saveState();
      }
    });
  });
  editList.querySelectorAll('[data-edit-note]').forEach(inp => {
    inp.addEventListener('change', () => {
      const ex = state.exercises[currentEditDay].find(x => x.id === inp.dataset.editNote);
      if (ex) { ex.note = inp.value.trim(); saveState(); }
    });
  });
  editList.querySelectorAll('[data-delete]').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.delete;
      const ex = state.exercises[currentEditDay].find(x => x.id === id);
      showModal('Remove exercise?', '"' + (ex && ex.name || 'This exercise') + '" will be removed from the ' + (currentEditDay === 'mon' ? 'Monday' : 'Friday') + ' list. Past session data is preserved.', () => {
        state.exercises[currentEditDay] = state.exercises[currentEditDay].filter(x => x.id !== id);
        saveState();
        renderEdit();
      });
    });
  });
  editList.querySelectorAll('[data-move-up]').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.moveUp;
      const arr = state.exercises[currentEditDay];
      const i = arr.findIndex(x => x.id === id);
      if (i > 0) { [arr[i-1], arr[i]] = [arr[i], arr[i-1]]; saveState(); renderEdit(); }
    });
  });
  editList.querySelectorAll('[data-move-down]').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.moveDown;
      const arr = state.exercises[currentEditDay];
      const i = arr.findIndex(x => x.id === id);
      if (i >= 0 && i < arr.length - 1) { [arr[i+1], arr[i]] = [arr[i], arr[i+1]]; saveState(); renderEdit(); }
    });
  });
}

document.querySelectorAll('.edit-day-toggle button').forEach(b => {
  b.addEventListener('click', () => { currentEditDay = b.dataset.editDay; renderEdit(); });
});

document.getElementById('add-ex-btn').addEventListener('click', () => {
  const id = currentEditDay[0] + Date.now().toString(36);
  state.exercises[currentEditDay].push({ id, name: 'New exercise', type: 'weighted', note: '' });
  saveState();
  renderEdit();
  setTimeout(() => {
    const inputs = editList.querySelectorAll('[data-edit-name]');
    const last = inputs[inputs.length - 1];
    if (last) { last.focus(); last.select(); }
  }, 50);
});

// ============================================================
// TABS
// ============================================================
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    currentTab = t.dataset.tab;
    document.querySelectorAll('.tab').forEach(x => x.classList.toggle('active', x === t));
    document.getElementById('tab-today').classList.toggle('hidden', currentTab !== 'today');
    document.getElementById('tab-history').classList.toggle('hidden', currentTab !== 'history');
    document.getElementById('tab-edit').classList.toggle('hidden', currentTab !== 'edit');
    if (currentTab === 'history') renderHistory();
    if (currentTab === 'edit') renderEdit();
    if (currentTab === 'today') renderToday();
  });
});

// ============================================================
// MODAL
// ============================================================
const modal = document.getElementById('modal');
function showModal(title, body, onConfirm, infoOnly) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').textContent = body;
  const confirmBtn = document.getElementById('modal-confirm');
  const cancelBtn = document.getElementById('modal-cancel');
  if (infoOnly) {
    confirmBtn.textContent = 'OK';
    confirmBtn.style.background = 'var(--accent)';
    cancelBtn.style.display = 'none';
  } else {
    confirmBtn.textContent = 'Confirm';
    confirmBtn.style.background = 'var(--danger)';
    cancelBtn.style.display = '';
  }
  modalCallback = onConfirm;
  modal.classList.add('show');
}
document.getElementById('modal-cancel').addEventListener('click', () => {
  modal.classList.remove('show');
  modalCallback = null;
});
document.getElementById('modal-confirm').addEventListener('click', () => {
  modal.classList.remove('show');
  if (modalCallback) modalCallback();
  modalCallback = null;
});

// ============================================================
// INIT
// ============================================================
function renderAll() {
  renderToday();
  renderHistory();
  renderEdit();
}

currentDay = defaultDayForDate(currentDate);
renderAll();
</script>
